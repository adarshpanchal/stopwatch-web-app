<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<header>STOP&nbsp;WATCH</header>

    <button class="start" onclick="">Start</button>
    <button class="stop">Stop</button>
    <button class="reset">Reset</button>
</div>
